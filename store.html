  <script>
    const STORES = {
      banpo: {
        name: '반포점', since: 'Since 2022',
        desc: '강남고속버스터미널, 수많은 사람들이 오가는 길목. 터미널의 시작점인 반포점은 누구나 잠시 머물러 한 잔의 위로를 얻고 다시 길을 나서는 공간입니다. 1,000원대에 담은 최상급 에스프레소로 도심 속 휴먼 허브의 하루를 엽니다.',
        addr: '서울 서초구 · 강남고속버스터미널', addrEn: 'Express Bus Terminal, Seocho-gu, Seoul',
        hours: '평일 08:00 – 20:00 · 주말 10:00 – 20:00',
        photos: ['assets/img/store/bonjeom-1.jpg','assets/img/store/bonjeom-2.jpg','assets/img/store/bonjeom-3.jpg','assets/img/store/bonjeom-4.jpg'],
      },
      gangseo: {
        name: '강서점', since: 'Since 2022',
        desc: '마곡의 너른 거리를 마주한 통유리 공간. 강서점은 햇살이 깊게 드는 자리에서 도심의 속도를 잠시 늦추도록 합니다. 매일 굽는 빵과 진심을 담은 한 잔으로, 머무는 모든 순간이 위로가 되는 공간을 만듭니다.',
        addr: '서울 강서구 · 마곡', addrEn: 'Magok, Gangseo-gu, Seoul',
        hours: '평일 08:00 – 20:00 · 주말 10:00 – 20:00',
        photos: Array.from({length:25}, (_,i)=>`assets/img/store/gangseo-${i+1}.jpg`),
      },
      sadang:  { name: '사당점', since: 'Coming Soon', desc: '터미널 사당점은 곧 여러분을 맞이할 준비를 하고 있습니다. 외부 전경 이미지는 촬영 예정입니다.', addr: '서울 동작구', addrEn: 'Dongjak-gu, Seoul', hours: '준비 중', photos: [] },
      bangbae: { name: '엔터하츠 방배', since: 'Coming Soon', desc: '엔터하츠 방배점은 곧 여러분을 맞이할 준비를 하고 있습니다. 외부 전경 이미지는 촬영 예정입니다.', addr: '서울 서초구 방배', addrEn: 'Bangbae, Seocho-gu, Seoul', hours: '준비 중', photos: [] },
      nonhyeon:{ name: '파마시아 논현', since: 'Coming Soon', desc: '파마시아 논현점은 곧 여러분을 맞이할 준비를 하고 있습니다. 외부 전경 이미지는 촬영 예정입니다.', addr: '서울 강남구 논현', addrEn: 'Nonhyeon, Gangnam-gu, Seoul', hours: '준비 중', photos: [] },
      gangdong:{ name: '강동점', since: 'Coming Soon', desc: '터미널 강동점은 곧 여러분을 맞이할 준비를 하고 있습니다. 외부 전경 이미지는 촬영 예정입니다.', addr: '서울 강동구', addrEn: 'Gangdong-gu, Seoul', hours: '준비 중', photos: [] },
    };
    const store = STORES[new URLSearchParams(location.search).get('id')] || STORES.banpo;
    document.title = `${store.name} · Terminal Espresso House`;

    const q = encodeURIComponent('터미널 에스프레소 하우스 ' + store.name);
    document.getElementById('sdSince').textContent = store.since;
    document.getElementById('sdName').textContent = store.name;
    document.getElementById('sdDesc').textContent = store.desc;
    document.getElementById('sdAddr').textContent = store.addr;
    document.getElementById('sdAddrEn').textContent = store.addrEn;
    document.getElementById('sdHours').textContent = store.hours;
    document.getElementById('sdMaps').innerHTML =
      `<a href="https://map.naver.com/p/search/${q}" target="_blank" rel="noopener noreferrer"><img src="assets/img/map-naver.png" alt="" width="16" height="16">네이버지도</a>` +
      `<a href="https://map.kakao.com/?q=${q}" target="_blank" rel="noopener noreferrer"><img src="assets/img/map-kakao.png" alt="" width="16" height="16">카카오맵</a>` +
      `<a href="https://www.google.com/maps/search/${q}" target="_blank" rel="noopener noreferrer"><img src="assets/img/map-google.png" alt="" width="16" height="16">구글지도</a>`;

    const hero = document.getElementById('sdHero');
    const grid = document.getElementById('sdPhotos');
    if (store.photos.length) {
      hero.style.backgroundImage = `url('${store.photos[0]}')`;
      grid.innerHTML = store.photos.slice(1).map(p =>
        `<div class="big" style="background-image:url('${p}')"></div>`
      ).join('');
    } else {
      hero.classList.add('is-empty');
      hero.innerHTML = '<span>외부 전경 촬영 예정</span>';
    }
  </script>
  <script src="assets/main.js"></script>
